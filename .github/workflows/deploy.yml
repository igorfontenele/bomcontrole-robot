name: CI/CD — Railway Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint + syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyflakes

      - name: Syntax check
        run: |
          python -m compileall -q baixar_faturas.py login_bomcontrole.py \
            upload_release.py enviar_email.py run_monthly.py

      - name: pyflakes (warnings only)
        run: pyflakes *.py || true

  deploy:
    name: Deploy to Railway
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service "${{ secrets.RAILWAY_SERVICE }}" --detach
